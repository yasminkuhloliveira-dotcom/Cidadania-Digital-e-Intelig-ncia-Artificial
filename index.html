<!-- Seção do Jogo no seu Site -->
<section id="jogo-cidadania" class="container-jogo">
    <h2>🎮 Desafio da Veracidade Digital</h2>
    <p>Coloque suas habilidades à prova! Analise os casos abaixo e descubra o que é Real e o que é Fake.</p>

    <!-- ÁREA DO QUIZ -->
    <div id="quiz-container">
        <div class="fase-header">
            <span id="fase-titulo">Fase 1: Veracidade Facial</span>
            <span id="fase-progresso">Questão 1 de 4</span>
        </div>
        
        <div id="pergunta-midia">
            <!-- Imagem, áudio ou link simulado aparecerá aqui -->
        </div>

        <p id="pergunta-texto">O que você acha desta mídia?</p>

        <div class="botoes-container">
            <button onclick="verificarResposta(true)" class="btn-real">🟢 Confiável / Real</button>
            <button onclick="verificarResposta(false)" class="btn-fake">🔴 Suspeito / Fake</button>
        </div>

        <div id="feedback" class="feedback-oculto"></div>
    </div>
</section>

<!-- ESTILIZAÇÃO DO JOGO (CSS) -->
<style>
    .container-jogo {
        padding: 30px;
        background: #f4f7f6;
        border-radius: 8px;
        max-width: 600px;
        margin: 20px auto;
        font-family: sans-serif;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    #quiz-container {
        background: white;
        padding: 20px;
        border-radius: 8px;
        margin-top: 15px;
    }
    .fase-header {
        display: flex;
        justify-content: space-between;
        font-weight: bold;
        color: #333;
        margin-bottom: 20px;
    }
    #pergunta-midia {
        min-height: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 20px 0;
        background: #eee;
        border-radius: 4px;
        padding: 10px;
    }
    .link-simulado {
        font-family: monospace;
        background: #fff3cd;
        padding: 10px;
        border: 1px dashed #ffc107;
        color: #856404;
    }
    .botoes-container {
        display: flex;
        gap: 15px;
        justify-content: center;
    }
    button {
        padding: 12px 24px;
        font-size: 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: 0.2s;
    }
    .btn-real { background: #28a745; color: white; }
    .btn-fake { background: #dc3545; color: white; }
    button:hover { opacity: 0.9; }
    #feedback {
        margin-top: 20px;
        padding: 15px;
        border-radius: 4px;
        font-weight: bold;
    }
    .feedback-oculto { display: none; }
    .acertou { background: #d4edda; color: #155724; display: block !important; }
    .errou { background: #f8d7da; color: #721c24; display: block !important; }
</style>

<!-- LÓGICA DO JOGO (JAVASCRIPT) -->
<script>
    // Banco de dados de perguntas cobrindo todos os seus pedidos
    const perguntas = [
        {
            fase: "Fase 1: Veracidade Facial (Deepfake)",
            tipo: "html",
            conteudo: "📁 <strong>[Imagem Simulada]</strong> Foto de um político famoso com a borda do rosto levemente borrada e reflexos diferentes em cada olho.",
            texto: "Ao analisar detalhadamente o rosto da pessoa na imagem, ela parece real?",
            ehReal: false,
            explicacao: "Fake! Bordas borradas e reflexos inconsistentes nos olhos são anomalias comuns de algoritmos sintéticos."
        },
        {
            fase: "Fase 2: Veracidade de Voz (Áudio IA)",
            tipo: "html",
            conteudo: "🔊 <strong>[Áudio Simulado]</strong> Mensagem de voz do seu amigo pedindo dinheiro emprestado, mas com tom robótico e pausas estranhas.",
            texto: "Essa mensagem de voz é segura?",
            ehReal: false,
            explicacao: "Fake! Criminosos usam clonagem de voz por IA. Sempre confirme por outro canal se a pessoa realmente fez o pedido."
        },
        {
            fase: "Fase 3: Veracidade de Link (Phishing)",
            tipo: "link",
            conteudo: "http://banc0-b0as-compras.com.br",
            texto: "Esse link enviado por SMS para recadastrar sua senha bancária é verdadeiro?",
            ehReal: false,
            explicacao: "Fake! O link usa letras e números parecidos (como o '0' no lugar do 'o') para imitar sites reais. Bancos não mandam links assim."
        },
        {
            fase: "Fase 4: Mural de Notícias (Fato ou Fake)",
            tipo: "html",
            conteudo: "📰 <strong>Mural de Notícias:</strong> 'Cientistas descobrem que comer chocolate antes de dormir cura 100% da insônia, diz blog SaúdeSemFim'.",
            texto: "Essa notícia que está viralizando nas redes sociais é confiável?",
            ehReal: false,
            explicacao: "Fake! Notícias milagrosas sem fontes científicas renomadas (como a OMS ou grandes portais de ciência) geralmente são falsas."
        }
    ];

    let indiceAtual = 0;

    function carregarFase() {
        const questao = perguntas[indiceAtual];
        document.getElementById("fase-titulo").innerText = questao.fase;
        document.getElementById("fase-progresso").innerText = `Questão ${indiceAtual + 1} de ${perguntas.length}`;
        document.getElementById("pergunta-texto").innerText = questao.texto;
        
        const midiaContainer = document.getElementById("pergunta-midia");
        if(questao.tipo === "link") {
            midiaContainer.innerHTML = `<span class="link-simulado">${questao.conteudo}</span>`;
        } else {
            midiaContainer.innerHTML = questao.conteudo;
        }
        
        // Esconde o feedback da questão anterior
        document.getElementById("feedback").className = "feedback-oculto";
    }

    function verificarResposta(escolhaUsuario) {
        const questao = perguntas[indiceAtual];
        const feedbackDiv = document.getElementById("feedback");
        
        if (escolhaUsuario === questao.ehReal) {
            feedbackDiv.innerHTML = `🎉 Parabéns! ${questao.explicacao}`;
            feedbackDiv.className = "acertou";
        } else {
            feedbackDiv.innerHTML = `❌ Ops! ${questao.explicacao}`;
            feedbackDiv.className = "errou";
        }

        // Avança para a próxima pergunta após 4 segundos
        setTimeout(() => {
            indiceAtual++;
            if (indiceAtual < perguntas.length) {
                carregarFase();
            } else {
                exibirFimJogo();
            }
        }, 4500);
    }

    function exibirFimJogo() {
        document.getElementById("quiz-container").innerHTML = `
            <h3>🏆 Desafio Concluído!</h3>
            <p>Você completou o circuito de segurança digital. Continue praticando o pensamento crítico na internet!</p>
            <button onclick="location.reload()" style="background:#007bff; color:white;">Jogar Novamente</button>
        `;
    }

    // Inicializa o jogo ao carregar a página
    window.onload = carregarFase;
</script>
